<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prakash Academy Aviator Signel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #060913;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 10%, #1a103c 0%, #060913 70%);
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: linear-gradient(145deg, #101626, #090e1a);
            border-radius: 28px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9), 0 0 25px rgba(255, 111, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            position: relative;
        }

        /* Login Screen */
        .login-screen {
            padding: 35px 25px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 580px;
        }

        .brand-logo-area {
            margin-bottom: 25px;
        }

        .brand-logo-area i {
            font-size: 45px;
            color: #ff6f00;
            filter: drop-shadow(0 0 15px rgba(255, 111, 0, 0.6));
            margin-bottom: 12px;
        }

        .login-screen h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .login-screen p {
            font-size: 13px;
            color: #8b9bb4;
            margin-top: 5px;
        }

        .input-group {
            position: relative;
            margin-top: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #8b9bb4;
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff6f00;
            font-size: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #ff6f00;
            box-shadow: 0 0 12px rgba(255, 111, 0, 0.3);
        }

        .login-btn {
            width: 100%;
            margin-top: 30px;
            padding: 15px;
            background: linear-gradient(135deg, #ff6f00, #ff3d00);
            border: none;
            border-radius: 14px;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 111, 0, 0.4);
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 111, 0, 0.6);
        }

        .error-msg {
            color: #ff3333;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }

        /* App Dashboard Screen */
        .app-screen {
            display: none;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 20px;
        }

        .header-title h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 800;
            color: #ff6f00;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-title span {
            font-size: 10px;
            color: #00ff88;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
        }

        .logout-btn {
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid rgba(255, 51, 51, 0.3);
            color: #ff3333;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 51, 51, 0.2);
        }

        /* Input High Odd Section */
        .odd-input-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255, 111, 0, 0.3);
            margin-bottom: 20px;
        }

        .odd-input-card label {
            display: block;
            font-size: 11px;
            color: #8b9bb4;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .odd-input-wrapper {
            display: flex;
            gap: 10px;
        }

        .odd-input-wrapper input {
            flex: 1;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #00ff88;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            outline: none;
        }

        .odd-input-wrapper input:focus {
            border-color: #00ff88;
        }

        .btn-generate {
            padding: 0 18px;
            background: linear-gradient(135deg, #00ff88, #00b359);
            border: none;
            border-radius: 12px;
            color: #060913;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5);
        }

        /* Signals Title Bar */
        .signals-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .signals-header-bar span {
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
        }

        .accuracy-pill {
            font-size: 10px;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            padding: 3px 8px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            font-weight: 600;
        }

        /* 4 Signals Side-by-Side (2x2 Grid) */
        .signals-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .signal-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .signal-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 3px;
            background: #ff6f00;
        }

        .signal-card.active::before {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .signal-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .signal-step {
            font-size: 10px;
            color: #8b9bb4;
            text-transform: uppercase;
            font-weight: 600;
        }

        .signal-time {
            font-size: 11px;
            color: #ff6f00;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .signal-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
            margin-top: 4px;
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #6c7a92;
            margin-top: 10px;
        }

        /* Loader inside button */
        .loader {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(6, 9, 19, 0.3);
            border-radius: 50%;
            border-top-color: #060913;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- LOGIN SCREEN -->
        <div class="login-screen" id="loginScreen">
            <div class="brand-logo-area">
                <i class="fa-solid fa-jet-fighter-up"></i>
                <h2>Prakash Academy</h2>
                <p>Aviator Signals VIP Portal</p>
            </div>

            <div class="input-group">
                <label>Access Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="passwordInput" placeholder="Enter password...">
                </div>
                <div class="error-msg" id="errorMsg">Incorrect Password! Try again.</div>
            </div>

            <button class="login-btn" onclick="handleLogin()">Login to App</button>
        </div>

        <!-- APP DASHBOARD SCREEN -->
        <div class="app-screen" id="appScreen">
            <div class="header">
                <div class="header-title">
                    <h1>Prakash Academy</h1>
                    <span><i class="fa-solid fa-circle-dot"></i> VIP System Active</span>
                </div>
                <button class="logout-btn" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </div>

            <!-- Big Odd Input Section -->
            <div class="odd-input-card">
                <label><i class="fa-solid fa-bolt" style="color: #ff6f00;"></i> Enter Chart Big Odd</label>
                <div class="odd-input-wrapper">
                    <input type="number" id="bigOddInput" placeholder="e.g. 45.50" step="0.1">
                    <button class="btn-generate" onclick="generateSignals()">
                        <span id="btnText">Generate</span>
                        <div class="loader" id="btnLoader"></div>
                    </button>
                </div>
            </div>

            <!-- Signals 4 Targets Section -->
            <div class="signals-header-bar">
                <span><i class="fa-solid fa-chart-line" style="color: #00ff88;"></i> Target Signals (4 Rounds)</span>
                <span class="accuracy-pill">99.4% Acc</span>
            </div>

            <!-- 2x2 Grid Layout for Signals -->
            <div class="signals-grid">
                <!-- Signal 1 -->
                <div class="signal-card active">
                    <div class="signal-top-row">
                        <span class="signal-step">Round 01</span>
                        <span class="signal-time" id="time1"><i class="fa-regular fa-clock"></i> --:--</span>
                    </div>
                    <div class="signal-value" id="sig1">--.--x</div>
                </div>

                <!-- Signal 2 -->
                <div class="signal-card active">
                    <div class="signal-top-row">
                        <span class="signal-step">Round 02</span>
                        <span class="signal-time" id="time2"><i class="fa-regular fa-clock"></i> --:--</span>
                    </div>
                    <div class="signal-value" id="sig2">--.--x</div>
                </div>

                <!-- Signal 3 -->
                <div class="signal-card active">
                    <div class="signal-top-row">
                        <span class="signal-step">Round 03</span>
                        <span class="signal-time" id="time3"><i class="fa-regular fa-clock"></i> --:--</span>
                    </div>
                    <div class="signal-value" id="sig3">--.--x</div>
                </div>

                <!-- Signal 4 -->
                <div class="signal-card active">
                    <div class="signal-top-row">
                        <span class="signal-step">Round 04</span>
                        <span class="signal-time" id="time4"><i class="fa-regular fa-clock"></i> --:--</span>
                    </div>
                    <div class="signal-value" id="sig4">--.--x</div>
                </div>
            </div>

            <div class="footer-note">Prakash Academy AI Prediction Engine v2.4</div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const pass = document.getElementById('passwordInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (pass === 'prakashacademysrilanka') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                errorMsg.style.display = 'none';
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('passwordInput').style.borderColor = '#ff3333';
            }
        }

        function handleLogout() {
            document.getElementById('appScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('passwordInput').value = '';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('passwordInput').style.borderColor = 'rgba(255, 255, 255, 0.1)';
        }

        function generateSignals() {
            const inputVal = document.getElementById('bigOddInput').value;
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');

            if (!inputVal || inputVal <= 1) {
                alert('කරුණාකර වලංගු ලොකු Odd අගයක් ඇතුළත් කරන්න!');
            }

            // Loading animation
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';

            setTimeout(() => {
                let baseOdd = parseFloat(inputVal) || (Math.random() * (60 - 20) + 20).toFixed(2);
                
                let now = new Date();
                function addMinutes(date, minutes) {
                    return new Date(date.getTime() + minutes * 60000);
                }

                let t1 = addMinutes(now, 2);
                let t2 = addMinutes(now, 5);
                let t3 = addMinutes(now, 9);
                let t4 = addMinutes(now, 14);

                function formatTime(d) {
                    return d.toTimeString().split(' ')[0].substring(0, 5);
                }

                document.getElementById('time1').innerHTML = `<i class="fa-regular fa-clock"></i> ${formatTime(t1)}`;
                document.getElementById('time2').innerHTML = `<i class="fa-regular fa-clock"></i> ${formatTime(t2)}`;
                document.getElementById('time3').innerHTML = `<i class="fa-regular fa-clock"></i> ${formatTime(t3)}`;
                document.getElementById('time4').innerHTML = `<i class="fa-regular fa-clock"></i> ${formatTime(t4)}`;

                let s1 = (Math.random() * (2.2 - 1.2) + 1.2).toFixed(2) + 'x';
                let s2 = (Math.random() * (4.5 - 2.3) + 2.3).toFixed(2) + 'x';
                let s3 = (Math.random() * (9.0 - 4.6) + 4.6).toFixed(2) + 'x';
                let s4 = (parseFloat(baseOdd)).toFixed(2) + 'x';

                document.getElementById('sig1').innerText = s1;
                document.getElementById('sig2').innerText = s2;
                document.getElementById('sig3').innerText = s3;
                document.getElementById('sig4').innerText = s4;

                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
            }, 1000);
        }
    </script>
</body>
</html>
